<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.45" y2="1">
      <stop offset="0" stop-color="#262017"/>
      <stop offset="1" stop-color="#0A0807"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2D690"/>
      <stop offset="0.5" stop-color="#D4A857"/>
      <stop offset="1" stop-color="#A67D34"/>
    </linearGradient>
    <pattern id="stripes" patternUnits="userSpaceOnUse" width="116" height="116" patternTransform="rotate(60)">
      <rect width="116" height="116" fill="#F3E9CE"/>
      <rect x="0" width="29" height="116" fill="#D63B3B"/>
      <rect x="58" width="29" height="116" fill="#1E5CB3"/>
    </pattern>
    <clipPath id="glass">
      <rect x="200" y="146" width="112" height="220" rx="56"/>
