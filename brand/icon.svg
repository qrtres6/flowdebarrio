  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <rect x="36" y="36" width="440" height="440" rx="108" fill="none" stroke="#D4A857" stroke-opacity="0.22" stroke-width="4"/>

  <rect x="186" y="132" width="140" height="248" rx="70" fill="url(#gold)"/>
  <rect x="200" y="146" width="112" height="220" fill="url(#stripes)" clip-path="url(#glass)"/>
  <rect x="200" y="146" width="112" height="220" rx="56" fill="none" stroke="#A67D34" stroke-width="5"/>

  <rect x="249" y="118" width="14" height="26" fill="url(#gold)"/>
  <rect x="249" y="368" width="14" height="26" fill="url(#gold)"/>
  <ellipse cx="256" cy="138" rx="84" ry="28" fill="url(#gold)"/>
  <ellipse cx="256" cy="374" rx="84" ry="28" fill="url(#gold)"/>
  <circle cx="256" cy="104" r="23" fill="url(#gold)"/>
  <circle cx="256" cy="408" r="23" fill="url(#gold)"/>
</svg>
